<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A walking diary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>A walking diary</h1>
        <div class="card">
            <div class="card-header card-header-row">
                <h2>걸음수 입력</h2>
                <div class="card-header-actions">
                    <button type="button" id="statsBtn" class="stats-header-btn" aria-label="통계 열기">통계</button>
                    <button type="button" id="settingsBtn" class="settings-btn" aria-label="설정 열기">설정</button>
                </div>
            </div>
            <div class="card-body">
                <div class="input-group steps-input-group">
                    <div class="steps-mode-row" role="radiogroup" aria-label="걸음 입력 방식">
                        <label class="steps-mode-option">
                            <input type="radio" name="stepsEntryMode" id="stepsModeCumulative" value="cumulative" checked>
                            <span>누적된 걸음수</span>
                        </label>
                        <label class="steps-mode-option">
                            <input type="radio" name="stepsEntryMode" id="stepsModeDaily" value="daily">
                            <span>기준날짜 걸음수</span>
                        </label>
                    </div>
                    <label for="steps" id="stepsInputMainLabel">기준날짜까지 누적된 걸음수</label>
                    <div class="input-flex">
                        <input type="number" id="steps" min="0">
                        <button type="button" id="clearStepsBtn" class="small-btn clear-steps-btn" aria-label="걸음수 입력값 삭제">×</button>
                        <button type="button" id="saveBtn" class="small-btn confirm-steps-btn">확인</button>
                    </div>
                </div>
                <div class="input-group action-group">
                    <div class="date-info inline-date-info">
                        <span class="date-label">기준 날짜:</span>
                        <button id="displayDateBtn" class="date-display-btn" type="button">
                            <span id="displayDate" class="date-display"></span>
                        </button>
                        <input type="date" id="baseDatePicker" class="hidden-date-input">
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="resultsCard">
            <div class="card-header">
                <h2>걸음수 통계 <span id="statsTargetHint" class="stats-target-hint"></span></h2>
            </div>
            <div class="card-body" id="results">
                <p id="noDataMsg">정보를 입력해 주세요.</p>
                <div id="statsContent" style="display: none;">
                    <div class="stat-item">
                        <span class="stat-label">기준일:</span>
                        <span id="standardDate" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">걸어온 날:</span>
                        <span id="daysPassed" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">걸어온 걸음:</span>
                        <span id="totalSteps" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">평균 하루 걸음:</span>
                        <span id="averageSteps" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">남은 날:</span>
                        <span id="daysLeft" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">남은 걸음수:</span>
                        <span id="stepsLeft" class="stat-value"></span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">평균 걸어야 될 걸음수:</span>
                        <span id="requiredAverageSteps" class="stat-value"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="statsModal" class="modal-overlay stats-full-overlay" style="display: none;">
        <div class="modal modal-stats-full">
            <div class="modal-header">
                <h3>통계</h3>
                <button type="button" id="closeStatsBtn" class="close-btn" aria-label="팝업 닫기">×</button>
            </div>
            <div class="modal-body stats-charts-body">
                <section class="stats-chart-block" aria-labelledby="cumulativeChartHeading">
                    <h4 id="cumulativeChartHeading" class="stats-chart-title">최근 30일 누적 걸음수</h4>
                    <div class="cumulative-chart-wrap">
                        <canvas id="cumulativeStatsChart" class="stats-chart-canvas" width="720" height="380"></canvas>
                        <div id="cumulativeChartTooltip" class="chart-tooltip-bubble" role="tooltip" hidden></div>
                    </div>
                </section>
                <section class="stats-chart-block" aria-labelledby="recentChartHeading">
                    <h4 id="recentChartHeading" class="stats-chart-title">최근 7일 걸음수</h4>
                    <div class="recent-chart-wrap">
                        <canvas id="recentStatsChart" class="stats-chart-canvas" width="720" height="400"></canvas>
                        <div id="barChartTooltip" class="chart-tooltip-bubble" role="tooltip" hidden></div>
                    </div>
                    <p id="recentStatsEncouragement" class="recent-stats-encouragement" hidden></p>
                    <div class="stats-walker-strip" aria-hidden="true">
                        <svg class="stats-walking-svg" viewBox="0 0 320 120" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" focusable="false">
                            <defs>
                                <linearGradient id="walkerSky" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#e8f4fc"/>
                                    <stop offset="100%" stop-color="#f5f7fa"/>
                                </linearGradient>
                                <clipPath id="walkerParallaxClip">
                                    <rect x="0" y="0" width="320" height="91"/>
                                </clipPath>
                                <!-- 타일 폭 160, 동일 패턴 3번 → 한 칸씩 밀어도 화면(320) 항상 채움 -->
                                <g id="walkerFarSceneryTile">
                                    <rect x="0" y="42" width="18" height="50" rx="2" fill="#9aa8b0"/>
                                    <rect x="22" y="28" width="24" height="64" rx="2" fill="#8796a3"/>
                                    <rect x="50" y="45" width="16" height="47" rx="2" fill="#b0bcc4"/>
                                    <rect x="72" y="33" width="20" height="59" rx="2" fill="#7d8b99"/>
                                    <rect x="98" y="46" width="22" height="46" rx="2" fill="#a8b4bd"/>
                                    <rect x="126" y="31" width="18" height="61" rx="2" fill="#8e9daa"/>
                                    <rect x="148" y="40" width="12" height="52" rx="2" fill="#95a5ad"/>
                                </g>
                                <g id="walkerNearSceneryTile">
                                    <rect x="4" y="66" width="6" height="26" fill="#6d4c41"/>
                                    <ellipse cx="7" cy="56" rx="15" ry="17" fill="#388e3c"/>
                                    <rect x="34" y="70" width="5" height="22" fill="#5d4037"/>
                                    <ellipse cx="36.5" cy="62" rx="12" ry="14" fill="#43a047"/>
                                    <rect x="58" y="68" width="7" height="24" fill="#6d4c41"/>
                                    <ellipse cx="61.5" cy="56" rx="16" ry="18" fill="#2e7d32"/>
                                    <rect x="88" y="71" width="5" height="21" fill="#5d4037"/>
                                    <ellipse cx="90.5" cy="63" rx="11" ry="13" fill="#66bb6a"/>
                                    <rect x="112" y="69" width="6" height="23" fill="#6d4c41"/>
                                    <ellipse cx="115" cy="57" rx="14" ry="16" fill="#388e3c"/>
                                    <rect x="138" y="70" width="5" height="22" fill="#5d4037"/>
                                    <ellipse cx="140.5" cy="61" rx="12" ry="14" fill="#43a047"/>
                                    <ellipse cx="150" cy="84" rx="10" ry="5" fill="#81c784" opacity="0.88"/>
                                </g>
                            </defs>
                            <rect class="stats-walker-bg" width="320" height="120" rx="8" fill="url(#walkerSky)"/>
                            <g clip-path="url(#walkerParallaxClip)">
                                <g class="walker-parallax-far">
                                    <g class="walker-parallax-far-track">
                                        <rect class="walker-parallax-measure" x="0" y="0" width="480" height="91" fill="none"/>
                                        <use href="#walkerFarSceneryTile"/>
                                        <use href="#walkerFarSceneryTile" transform="translate(160, 0)"/>
                                        <use href="#walkerFarSceneryTile" transform="translate(320, 0)"/>
                                    </g>
                                </g>
                                <g class="walker-parallax-near">
                                    <g class="walker-parallax-near-track">
                                        <rect class="walker-parallax-measure" x="0" y="0" width="480" height="91" fill="none"/>
                                        <use href="#walkerNearSceneryTile"/>
                                        <use href="#walkerNearSceneryTile" transform="translate(160, 0)"/>
                                        <use href="#walkerNearSceneryTile" transform="translate(320, 0)"/>
                                    </g>
                                </g>
                            </g>
                            <line class="stats-walker-ground" x1="12" y1="92" x2="308" y2="92"/>
                            <!-- 바깥 g: 정중앙 고정 / 안쪽만 CSS drift (transform 덮어쓰기 방지) -->
                            <g transform="translate(160, 92)">
                                <g class="stats-walker-figure">
                                <ellipse class="walker-shadow" cx="0" cy="2" rx="18" ry="4" fill="rgba(44,62,80,0.12)"/>
                                <g class="walker-bob">
                                    <g class="walker-hip-group" transform="translate(0, -32)">
                                        <circle class="walker-head" cx="0" cy="-30" r="12" fill="#34495e"/>
                                        <rect class="walker-torso" x="-11" y="-20" width="22" height="32" rx="5" fill="#3498db"/>
                                        <g transform="translate(-11, -14)">
                                            <g class="walker-arm walker-arm-left">
                                                <line class="walker-limb" x1="0" y1="0" x2="-6" y2="22"/>
                                            </g>
                                        </g>
                                        <g transform="translate(11, -14)">
                                            <g class="walker-arm walker-arm-right">
                                                <line class="walker-limb" x1="0" y1="0" x2="6" y2="22"/>
                                            </g>
                                        </g>
                                        <g transform="translate(-6, 12)">
                                            <g class="walker-leg walker-leg-left">
                                                <line class="walker-limb walker-limb-leg" x1="0" y1="0" x2="0" y2="36"/>
                                            </g>
                                        </g>
                                        <g transform="translate(6, 12)">
                                            <g class="walker-leg walker-leg-right">
                                                <line class="walker-limb walker-limb-leg" x1="0" y1="0" x2="0" y2="36"/>
                                            </g>
                                        </g>
                                    </g>
                                </g>
                                </g>
                            </g>
                        </svg>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal modal-settings">
            <div class="modal-header">
                <h3>설정</h3>
                <button type="button" id="closeSettingsBtn" class="close-btn" aria-label="설정 닫기">×</button>
            </div>
            <div class="modal-body settings-modal-body">
                <div class="settings-field">
                    <label for="settingsStartDate">시작일</label>
                    <input type="date" id="settingsStartDate" disabled>
                </div>
                <div class="settings-field">
                    <label for="settingsEndDate">종료일</label>
                    <input type="date" id="settingsEndDate" disabled>
                </div>
                <div class="settings-field">
                    <label for="settingsTargetSteps">목표 걸음수</label>
                    <input type="number" id="settingsTargetSteps" min="1" step="1" disabled>
                </div>
                <div class="settings-actions">
                    <button type="button" id="settingsResetBtn" class="small-btn secondary-btn">초기화</button>
                    <button type="button" id="settingsSaveBtn" class="small-btn" disabled>저장</button>
                    <button type="button" id="settingsRestoreBtn" class="small-btn secondary-btn" disabled>복구</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
